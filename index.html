<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GithubStar — Top Starred Projects Daily</title>
  <meta name="description" content="Daily leaderboard of the most starred GitHub repositories. Auto-updated every 24 hours." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Root ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
  --bg:        #080c10;
  --surface:   #0d1117;
  --card:      #111820;
  --border:    #1e2736;
  --border2:   #2a3547;
  --gold:      #f0b429;
  --gold2:     #ffd166;
  --blue:      #58a6ff;
  --green:     #3fb950;
  --purple:    #bc8cff;
  --red:       #f85149;
  --muted:     #8b949e;
  --dim:       #484f58;
  --text:      #e6edf3;
  --mono:      'Space Mono', monospace;
  --sans:      'Syne', sans-serif;
}

/* ── Light mode ───────────────────────────────────────────── */
body.light {
  --bg:      #ffffff;
  --surface: #f6f8fa;
  --card:    #ffffff;
  --border:  #d0d7de;
  --border2: #b0b7be;
  --blue:    #0969da;
  --green:   #1a7f37;
  --muted:   #57606a;
  --dim:     #8c959f;
  --text:    #1f2328;
  --gold:    #d4a017;
}

body.light::after { opacity: 0.08; }
body.light::before { opacity: 0.2; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── Grid background ──────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.3;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 0%, black 30%, transparent 100%);
    }

    /* ── Layout ───────────────────────────────────────────────── */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      padding: 56px 0 40px;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo-star {
      font-size: 36px;
      animation: pulse-star 2.5s ease-in-out infinite;
    }

    @keyframes pulse-star {
      0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 6px rgba(240,180,41,0.6)); }
      50%       { transform: scale(1.15) rotate(12deg); filter: drop-shadow(0 0 18px rgba(240,180,41,1)); }
    }

    .logo-text {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(240,180,41,0.4);
    }

    .logo-text span { color: var(--text); }

    .tagline {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
    }

    /* ── Stats bar ────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .stat-chip .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .stat-chip .val { color: var(--text); font-weight: 700; }

    /* ── Filter bar ───────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 220px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }

    .search-box::placeholder { color: var(--dim); }
    .search-box:focus { border-color: var(--gold); }

    .lang-filter {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color .2s;
    }

    .lang-filter:focus { border-color: var(--gold); }

    /* ── Repo grid ────────────────────────────────────────────── */
    #repo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* ── Repo card ────────────────────────────────────────────── */
    .repo-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      cursor: pointer;
      transition: border-color .25s, transform .25s, box-shadow .25s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fade-up .4s ease both;
      overflow: hidden;
    }

    .repo-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(240,180,41,.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .25s;
    }

    .repo-card:hover {
      border-color: var(--border2);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }

    .repo-card:hover::before { opacity: 1; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Top-1, 2, 3 crowns */
    .repo-card.rank-1 { border-color: rgba(240,180,41,.5); }
    .repo-card.rank-2 { border-color: rgba(192,192,192,.35); }
    .repo-card.rank-3 { border-color: rgba(205,127,50,.35); }

    /* Card header */
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      object-fit: cover;
      flex-shrink: 0;
    }

    .card-meta { flex: 1; min-width: 0; }

    .repo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--blue);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.3px;
    }

    .repo-owner {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      margin-top: 2px;
    }

    .rank-badge {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      background: rgba(240,180,41,.12);
      border: 1px solid rgba(240,180,41,.25);
      border-radius: 6px;
      padding: 3px 8px;
      flex-shrink: 0;
    }

    /* Description */
    .repo-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Topics */
    .topics {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .topic {
      background: rgba(88,166,255,.1);
      color: var(--blue);
      border: 1px solid rgba(88,166,255,.2);
      border-radius: 20px;
      padding: 2px 10px;
      font-family: var(--mono);
      font-size: 11px;
    }

    /* Footer stats */
    .card-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .stat .n { color: var(--text); font-weight: 700; }

    .lang-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 5px;
    }

    .stars-count { color: var(--gold); font-weight: 700 !important; }

    /* ── Loading state ────────────────────────────────────────── */
    #loading {
      text-align: center;
      padding: 80px 0;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 2px solid var(--border2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ──────────────────────────────────────────── */
    #empty {
      display: none;
      text-align: center;
      padding: 60px 0;
      font-family: var(--mono);
      color: var(--dim);
      font-size: 14px;
    }

    /* ── Footer ───────────────────────────────────────────────── */
    footer {
      margin-top: 72px;
      padding: 32px 0 40px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    /* ── Scroll top ───────────────────────────────────────────── */
    #scroll-top {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 10px;
      width: 44px; height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      transform: translateY(12px);
      z-index: 100;
    }

    #scroll-top.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 600px) {
      #repo-grid { grid-template-columns: 1fr; }
      .filter-bar { flex-direction: column; }
      .search-box, .lang-filter { width: 100%; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <span class="logo-star">⭐</span>
      <span class="logo-text">Github<span>Star</span></span>
    </div>
    <p class="tagline">// daily leaderboard of the most starred open-source projects on earth</p>

    <div class="stats-bar" id="stats-bar">
      <div class="stat-chip"><span class="dot"></span> <span>live</span></div>
      <div class="stat-chip">updated <span class="val" id="stat-date">—</span></div>
      <div class="stat-chip"><span class="val" id="stat-count">—</span> repos tracked</div>
    </div>
  </header>

  <!-- ── Filter bar ─────────────────────────────────────────── -->
  <div class="filter-bar">
    <input
      class="search-box"
      id="search"
      type="text"
      placeholder="/ search repos..."
      autocomplete="off"
    />
    <select class="lang-filter" id="lang-filter">
      <option value="">All Languages</option>
    </select>
  </div>

  <!-- ── Grid ───────────────────────────────────────────────── -->
  <div id="loading">
    <div class="spinner"></div>
    <div>fetching star data...</div>
  </div>
  <div id="empty">no repos match your search.</div>
  <div id="repo-grid"></div>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <footer>
    <p style="margin-top:8px">
    <a href="https://github.com/Ma-researchwork/GithubStar/" target="_blank">
      ⬡ GitHub Repo
    </a>
    &nbsp;·&nbsp;
  
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeWwqdiH8gONhNt9YVmkKgiiexcrsEuiJ2DOpydWMX7TxkSrQ/viewform?usp=header" target="_blank">
      subscribe →
    </a>
  </p>
  </footer>
</div><!-- /wrap -->
<!-- Theme toggle -->
<div id="theme-toggle" onclick="toggleTheme()"
  style="position:fixed;bottom:28px;left:28px;background:var(--card);
         border:1px solid var(--border2);border-radius:10px;width:44px;height:44px;
         display:flex;align-items:center;justify-content:center;cursor:pointer;
         font-size:20px;z-index:100;transition:all .2s">
  🌙
</div>
<!-- Scroll top -->
<div id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
// ── Data loading ──────────────────────────────────────────────────
let ALL_REPOS = [];

async function loadData() {
  try {
    const res  = await fetch(`./data/repos.json?t=${Date.now()}`);
    const data = await res.json();
    ALL_REPOS  = data.repos || [];

    document.getElementById('stat-date').textContent  = data.updated_date || '—';
    document.getElementById('stat-count').textContent = ALL_REPOS.length;

    populateLangFilter(ALL_REPOS);
    renderGrid(ALL_REPOS);
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:var(--red);font-family:var(--mono);font-size:13px">' +
      '⚠ Could not load data. Run the fetch script first.</p>';
    console.error(e);
  }
}

// ── Language filter ───────────────────────────────────────────────
function populateLangFilter(repos) {
  const langs = [...new Set(repos.map(r => r.language).filter(Boolean))].sort();
  const sel   = document.getElementById('lang-filter');
  langs.forEach(l => {
    const opt = document.createElement('option');
    opt.value = l; opt.textContent = l;
    sel.appendChild(opt);
  });
}

// ── Render ────────────────────────────────────────────────────────
function renderGrid(repos) {
  const grid   = document.getElementById('repo-grid');
  const empty  = document.getElementById('empty');
  const loading = document.getElementById('loading');

  loading.style.display = 'none';

  if (!repos.length) {
    empty.style.display = 'block';
    grid.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = repos.map((r, i) => cardHTML(r, i)).join('');
}

function fmt(n) {
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n/1_000).toFixed(1) + 'k';
  return n;
}

function rankEmoji(rank) {
  if (rank === 1) return '🥇';
  if (rank === 2) return '🥈';
  if (rank === 3) return '🥉';
  return `#${rank}`;
}

function cardHTML(r, i) {
  const delay    = Math.min(i * 40, 600);
  const topics   = (r.topics || []).slice(0,4).map(t =>
    `<span class="topic">${t}</span>`).join('');
  const langDot  = r.lang_color
    ? `<span class="lang-dot" style="background:${r.lang_color}"></span>`
    : '';
  const rankClass = r.rank <= 3 ? `rank-${r.rank}` : '';

  return `
  <a class="repo-card ${rankClass}" href="${r.url}" target="_blank" rel="noopener"
     style="animation-delay:${delay}ms">
    <div class="card-top">
      <img class="avatar" src="${r.avatar}" alt="${r.owner}" loading="lazy"
           onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\\'http://www.w3.org/2000/svg\\'/%3E'">
      <div class="card-meta">
        <div class="repo-name">${r.name}</div>
        <div class="repo-owner">${r.owner}</div>
      </div>
      <div class="rank-badge">${rankEmoji(r.rank)}</div>
    </div>

    ${r.description ? `<p class="repo-desc">${r.description}</p>` : ''}

    ${topics ? `<div class="topics">${topics}</div>` : ''}

    <div class="card-footer">
      <div class="stat">⭐ <span class="n stars-count">${fmt(r.stars)}</span></div>
      <div class="stat">🍴 <span class="n">${fmt(r.forks)}</span></div>
      ${r.language ? `<div class="stat" style="margin-left:auto">${langDot}<span>${r.language}</span></div>` : ''}
    </div>
  </a>`;
}

// ── Filtering ─────────────────────────────────────────────────────
function filterRepos() {
  const q    = document.getElementById('search').value.toLowerCase().trim();
  const lang = document.getElementById('lang-filter').value;

  const filtered = ALL_REPOS.filter(r => {
    const matchQ = !q ||
      r.name.toLowerCase().includes(q) ||
      r.full_name.toLowerCase().includes(q) ||
      (r.description || '').toLowerCase().includes(q) ||
      (r.topics || []).some(t => t.toLowerCase().includes(q));
    const matchL = !lang || r.language === lang;
    return matchQ && matchL;
  });

  renderGrid(filtered);
}

document.getElementById('search').addEventListener('input', filterRepos);
document.getElementById('lang-filter').addEventListener('change', filterRepos);

// ── Scroll top button ─────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scroll-top');
  btn.classList.toggle('visible', window.scrollY > 400);
});
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-toggle').textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

// Remember user's preference
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('theme-toggle').textContent = '🌙';
}
// ── Boot ──────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
