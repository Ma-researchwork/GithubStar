name: 🌟 Daily GitHub Stars Update

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🔭 Fetch top repos
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          SUBSCRIBERS: ${{ secrets.SUBSCRIBERS }}
        run: python scripts/fetch_repos.py

      - name: 💾 Commit updated repos data
        run: |
          git config user.name "GithubStar Bot"
          git config user.email "bot@githubstar.app"
          git add data/repos.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update top repos data"
            git push
          fi
